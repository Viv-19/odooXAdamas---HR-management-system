<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Forgot Password - Clarity HRMS</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700&amp;family=Inter:wght@400;500;600&amp;display=swap"
        rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet">
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-surface": "#131b2e",
                        "surface-container-low": "#f2f3ff",
                        "on-primary-fixed-variant": "#004c6e",
                        "tertiary-fixed": "#dbe4ea",

                        "on-surface-variant": "#3e4850",
                        "on-background": "#131b2e",
                        "outline": "#6e7881",
                        "surface-container-high": "#e2e7ff",
                        "on-error": "#ffffff",
                        "on-tertiary-fixed": "#141d21",
                        "error": "#ba1a1a",
                        "surface-bright": "#faf8ff",
                        "primary-fixed": "#c9e6ff",
                        "surface-container-highest": "#dae2fd",
                        "on-tertiary-fixed-variant": "#3f484d",
                        "on-secondary-fixed": "#0b1c30",
                        "secondary-fixed": "#d3e4fe",
                        "surface": "#faf8ff",
                        "primary-fixed-dim": "#89ceff",
                        "primary-container": "#0ea5e9",
                        "primary": "#006591",
                        "on-primary-container": "#003751",
                        "on-secondary-container": "#54647a",
                        "secondary": "#505f76",
                        "surface-tint": "#006591",
                        "secondary-container": "#d0e1fb",
                        "on-error-container": "#93000a",
                        "tertiary-fixed-dim": "#bfc8ce",
                        "error-container": "#ffdad6",
                        "tertiary-container": "#949da3",
                        "background": "#faf8ff",
                        "inverse-surface": "#283044",
                        "on-secondary": "#ffffff",
                        "inverse-primary": "#89ceff",
                        "secondary-fixed-dim": "#b7c8e1",
                        "surface-container-lowest": "#ffffff",
                        "on-secondary-fixed-variant": "#38485d",
                        "on-tertiary-container": "#2c3539",
                        "surface-container": "#eaedff",
                        "on-primary-fixed": "#001e2f",
                        "on-primary": "#ffffff",
                        "surface-dim": "#d2d9f4",
                        "outline-variant": "#bec8d2",
                        "on-tertiary": "#ffffff"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "margin-mobile": "16px",
                        "lg": "24px",
                        "md": "16px",
                        "sm": "8px",
                        "gutter": "24px",
                        "base": "4px",
                        "xs": "4px",
                        "xl": "40px",
                        "margin-desktop": "48px"
                    },
                    "fontFamily": {
                        "headline-lg": ["Manrope"],
                        "body-md": ["Inter"],

                        "body-lg": ["Inter"],
                        "headline-xl": ["Manrope"],

                        "label-sm": ["Inter"],

                }
            }
        }

    <style>
        body {
            background-color: #f8fafc;
        }
    </style>
</head>

<body
    class="min-h-screen flex items-center justify-center p-margin-mobile md:p-margin-desktop font-body-md text-on-surface">
    <div class="w-full max-w-md flex flex-col items-center">
        <!-- Brand Logo & Name -->
        <div class="flex items-center gap-sm mb-lg">
            <span class="material-symbols-outlined text-[32px] text-primary" data-icon="corporate_fare"
                style="font-variation-settings: 'FILL' 1;">corporate_fare</span>
            <h1 class="font-headline-lg text-headline-lg text-primary tracking-tight">HRMS</h1>
        </div>
        <!-- Central Card -->
        <div class="w-full bg-surface-container-lowest border border-[#e2e8f0] rounded-[16px] p-lg md:p-xl shadow-sm">
            <div class="mb-lg text-center">
                <h2 class="font-headline-md text-headline-md text-on-surface mb-sm">Forgot Password?</h2>
                <p class="font-body-md text-body-md text-on-surface-variant">Enter your email address and we'll send you
                    a code to reset your password.</p>
            </div>
            <form class="flex flex-col gap-md">
                <!-- Email Input -->
                <div class="flex flex-col gap-xs">
                    <label class="font-label-md text-label-md text-on-surface-variant" for="email">Email Address</label>
                    <div class="relative">
                        <span
                            class="absolute left-sm top-1/2 -translate-y-1/2 material-symbols-outlined text-outline-variant"
                            data-icon="mail">mail</span>
                        <input
                            class="w-full pl-xl pr-md py-sm bg-surface-container-lowest border border-[#cbd5e1] rounded-lg font-body-md text-body-md text-on-surface placeholder:text-outline-variant focus:outline-none focus:border-primary-container focus:ring-[3px] focus:ring-primary-container/20 transition-all"
                            id="email" placeholder="name@company.com" type="email">
                    </div>
                </div>
                <!-- Primary Button -->
                <button
                    class="w-full bg-[#0ea5e9] text-white py-sm rounded-lg font-label-md text-label-md mt-sm hover:bg-[#0284c7] transition-colors focus:outline-none focus:ring-[3px] focus:ring-[#0ea5e9]/30"
                    type="button">
                    Send Reset Code
                </button>
            </form>
        </div>
        <!-- Footer Link -->
        <a class="mt-lg flex items-center gap-xs font-label-md text-label-md text-secondary hover:text-primary-container transition-colors group"
            href="#">
            <span class="material-symbols-outlined text-[18px] group-hover:-translate-x-1 transition-transform"
                data-icon="arrow_back">arrow_back</span>
            Back to Sign In
        </a>
    </div>


</body>

</html>
