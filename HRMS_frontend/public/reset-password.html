<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — HRMS</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <script src="assets/js/theme.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=block" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/global.css">
</head>
<body data-auth-page="reset" class="min-h-screen flex items-center justify-center p-4"
      style="background:radial-gradient(1200px 600px at 50% -10%, #e0f2fe 0%, var(--background) 55%);">
  <main class="w-full max-w-[440px]">
    <a href="signin.html" class="flex items-center justify-center gap-3 mb-8">
      <span style="width:40px;height:40px;border-radius:11px;background:linear-gradient(135deg,var(--primary),var(--primary-container));display:flex;align-items:center;justify-content:center;box-shadow:0 4px 14px rgba(14,165,233,.35);">
        <span class="material-symbols-outlined icon-fill" style="color:#fff;">corporate_fare</span>
      </span>
      <span class="h-lg" style="font-size:26px;">HRMS</span>
    </a>

    <div class="card animate-in" style="padding:32px;">
      <div class="text-center mb-6">
        <h1 class="h-lg mb-1">Set a new password</h1>
        <p class="text-muted" style="font-size:14px;">Choose a strong password you haven't used before.</p>
      </div>

      <form class="flex flex-col gap-4" novalidate>
        <div class="field">
          <label for="password">New Password</label>
          <div class="relative">
            <input class="input" id="password" name="password" type="password" autocomplete="new-password" placeholder="Enter new password" style="padding-right:44px;">
            <button type="button" data-toggle-password="#password" aria-label="Toggle password visibility"
                    class="absolute" style="right:8px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--outline);cursor:pointer;display:flex;">
              <span class="material-symbols-outlined">visibility_off</span>
            </button>
          </div>
        </div>

        <div id="pw-strength" class="flex items-center gap-3" style="margin-top:-4px;">
          <div style="flex:1;height:6px;border-radius:9999px;background:var(--surface-container-high);overflow:hidden;">
            <div data-bar style="height:100%;width:0;background:var(--outline-variant);transition:width .2s,background .2s;"></div>
          </div>
          <span data-label style="font-size:12px;font-weight:600;min-width:52px;text-align:right;"></span>
        </div>

        <div class="field">
          <label for="confirmPassword">Confirm Password</label>
          <div class="relative">
            <input class="input" id="confirmPassword" name="confirmPassword" type="password" autocomplete="new-password" placeholder="Re-enter new password" style="padding-right:44px;">
            <button type="button" data-toggle-password="#confirmPassword" aria-label="Toggle password visibility"
                    class="absolute" style="right:8px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--outline);cursor:pointer;display:flex;">
              <span class="material-symbols-outlined">visibility_off</span>
            </button>
          </div>
        </div>
        <p class="field-hint">Must be at least 8 characters and include a special character.</p>

        <button type="submit" class="btn btn-primary" style="width:100%;">Update Password</button>
      </form>

      <a class="flex items-center justify-center gap-1 link mt-6" style="font-size:14px;" href="signin.html">
        <span class="material-symbols-outlined" style="font-size:18px;">arrow_back</span> Back to Sign In
      </a>
    </div>
  </main>

  <script src="js/utils.js"></script>
  <script src="assets/js/store.js"></script>
  <script src="assets/js/ui.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
