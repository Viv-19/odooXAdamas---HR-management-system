<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile — HRMS</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <script src="assets/js/theme.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=block" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/global.css">
  <link rel="stylesheet" href="assets/css/app.css">
  <style>
    .info-row { display:flex;justify-content:space-between;gap:16px;padding:11px 0;border-bottom:1px solid var(--surface-container-high);font-size:14px; }
    .info-row:last-child { border-bottom:none; }
    .info-row .k { color:var(--on-surface-variant); }
    .info-row .v { font-weight:600;text-align:right; }
    .contact-chip { display:flex;align-items:center;gap:10px;font-size:14px;padding:8px 0; }
    .contact-chip .material-symbols-outlined { font-size:20px;color:var(--primary-hover); }
    .subcard-title { font-family:var(--font-heading);font-weight:600;font-size:15px;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--surface-variant); }
  </style>
</head>
<body>
  <div class="app-layout" id="hrms-app">
    <div class="app-main">
      <header class="app-topbar" id="hrms-topbar"></header>
      <main class="app-content">
        <div id="profile-root"></div>
      </main>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/utils.js"></script>
  <script src="assets/js/store.js"></script>
  <script src="assets/js/ui.js"></script>
  <script src="assets/js/shell.js"></script>
  <script src="assets/js/profile.js"></script>
  <script>HRMS.shell.mount({ active: HRMS.store.isAdmin() ? "employees" : "profile" });</script>
</body>
</html>
