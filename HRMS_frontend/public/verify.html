<body class="h-full font-body-md text-on-surface bg-surface-container-low flex items-center justify-center p-4">
    <!-- Transactional Screen - No Nav Bars Rendered -->
    <main class="w-full max-w-[480px]">
        <!-- Brand Header -->
        <div class="flex justify-center mb-8">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-lg bg-primary-container flex items-center justify-center shadow-sm">
                    <span class="material-symbols-outlined text-white" style="font-variation-settings: 'FILL' 1;">
                        domain
                    </span>
                </div>
                <h1 class="font-headline-md text-headline-md font-bold text-on-surface tracking-tight">HRMS</h1>
            </div>
        </div>
        <!-- Main Card Container -->
        <div
            class="bg-surface-container-lowest rounded-xl shadow-[0px_4px_20px_rgba(0,0,0,0.05)] border border-surface-variant p-8 md:p-10 text-center relative overflow-hidden">
            <!-- Decorative Background Element -->
            <div
                class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-primary-container via-primary to-inverse-primary">
            </div>
            <!-- Email Icon Graphic -->
            <div
                class="mx-auto w-24 h-24 rounded-full bg-surface-container flex items-center justify-center mb-6 border-4 border-surface-container-lowest shadow-sm relative">
                <span class="material-symbols-outlined text-4xl text-primary-container"
                    style="font-variation-settings: 'FILL' 1;">
                    mark_email_read
                </span>
                <!-- Decorative floating dot -->
                <div
                    class="absolute top-2 right-2 w-4 h-4 rounded-full bg-primary-fixed border-2 border-surface-container-lowest">
                </div>
            </div>
            <!-- Content Area -->
            <h2
                class="font-headline-xl-mobile md:font-headline-lg text-headline-xl-mobile md:text-headline-lg text-on-surface mb-4">
                Verify Your Email
            </h2>
            <p class="font-body-lg text-body-lg text-on-surface-variant mb-8 px-4">We've sent a 6-digit OTP to your
                email address. Please enter the code below to activate your HRMS account.</p>
            <!-- Actions Area -->
            <div class="flex flex-col gap-4">
                <div class="flex flex-col gap-6">
                    <div class="flex justify-between gap-2 px-2"><input
                            class="w-12 h-14 text-center text-xl font-bold border-2 border-outline-variant rounded-lg focus:border-primary-container focus:ring-2 focus:ring-primary-container/20 outline-none transition-all"

                            class="w-12 h-14 text-center text-xl font-bold border-2 border-outline-variant rounded-lg focus:border-primary-container focus:ring-2 focus:ring-primary-container/20 outline-none transition-all"
                            maxlength="1" type="text"><input
                            class="w-12 h-14 text-center text-xl font-bold border-2 border-outline-variant rounded-lg focus:border-primary-container focus:ring-2 focus:ring-primary-container/20 outline-none transition-all"
                            maxlength="1" type="text"><input
                            class="w-12 h-14 text-center text-xl font-bold border-2 border-outline-variant rounded-lg focus:border-primary-container focus:ring-2 focus:ring-primary-container/20 outline-none transition-all"
