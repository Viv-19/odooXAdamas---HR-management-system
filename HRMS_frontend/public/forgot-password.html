<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password — HRMS</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <script src="assets/js/theme.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=block" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/global.css">
</head>
<body data-auth-page="forgot" class="min-h-screen flex items-center justify-center p-4"
      style="background:radial-gradient(1200px 600px at 50% -10%, #e0f2fe 0%, var(--background) 55%);">
  <main class="w-full max-w-[440px]">
    <a href="signin.html" class="flex items-center justify-center gap-3 mb-8">
      <span style="width:40px;height:40px;border-radius:11px;background:linear-gradient(135deg,var(--primary),var(--primary-container));display:flex;align-items:center;justify-content:center;box-shadow:0 4px 14px rgba(14,165,233,.35);">
        <span class="material-symbols-outlined icon-fill" style="color:#fff;">corporate_fare</span>
      </span>
      <span class="h-lg" style="font-size:26px;">HRMS</span>
    </a>

    <div class="card animate-in" style="padding:32px;">
      <div class="text-center mb-6">
        <div class="mx-auto flex items-center justify-center mb-4" style="width:64px;height:64px;border-radius:9999px;background:var(--primary-light);">
          <span class="material-symbols-outlined icon-fill" style="font-size:30px;color:var(--primary-hover);">lock_reset</span>
        </div>
        <h1 class="h-lg mb-1">Forgot password?</h1>
        <p class="text-muted" style="font-size:14px;">Enter your email and we'll send you a code to reset your password.</p>
      </div>

      <form class="flex flex-col gap-4" novalidate>
        <div class="field">
          <label for="email">Email Address</label>
          <div class="relative">
            <span class="material-symbols-outlined absolute" style="left:12px;top:50%;transform:translateY(-50%);color:var(--outline);font-size:20px;">mail</span>
            <input class="input" id="email" name="email" type="email" placeholder="name@company.com" style="padding-left:42px;">
          </div>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;">Send Reset Code</button>
      </form>

      <a class="flex items-center justify-center gap-1 link mt-6" style="font-size:14px;" href="signin.html">
        <span class="material-symbols-outlined" style="font-size:18px;">arrow_back</span> Back to Sign In
      </a>
    </div>
  </main>

  <script src="js/utils.js"></script>
  <script src="assets/js/store.js"></script>
  <script src="assets/js/ui.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
