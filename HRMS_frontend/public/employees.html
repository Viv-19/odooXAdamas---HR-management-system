<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Employees — HRMS</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <script src="assets/js/theme.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=block" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/global.css">
  <link rel="stylesheet" href="assets/css/app.css">
</head>
<body>
  <div class="app-layout" id="hrms-app">
    <div class="app-main">
      <header class="app-topbar" id="hrms-topbar"></header>
      <main class="app-content">
        <div class="page-header">
          <div>
            <h1 class="page-title">Employee Directory</h1>
            <p class="page-subtitle">Manage and view all team members.</p>
          </div>
          <div class="flex items-center gap-3">
            <label class="topbar-search" style="height:44px;max-width:260px;">
              <span class="material-symbols-outlined" style="font-size:20px;">search</span>
              <input id="emp-search" type="text" placeholder="Search employees…">
            </label>
            <a href="employee-add.html" class="btn btn-primary"><span class="material-symbols-outlined">add</span>Add New Employee</a>
          </div>
        </div>

        <!-- Status legend -->
        <div class="flex items-center gap-5 mb-5" style="font-size:13px;color:var(--on-surface-variant);">
          <span class="flex items-center gap-2"><span class="dot dot-present"></span>Present</span>
          <span class="flex items-center gap-2"><span class="material-symbols-outlined" style="font-size:16px;color:var(--info);">flight</span>On leave</span>
          <span class="flex items-center gap-2"><span class="dot dot-absent"></span>Absent</span>
        </div>

        <div id="emp-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-5"></div>
        <div id="emp-empty" class="text-muted" style="display:none;padding:48px;text-align:center;">No employees match your search.</div>
      </main>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/utils.js"></script>
  <script src="assets/js/store.js"></script>
  <script src="assets/js/ui.js"></script>
  <script src="assets/js/shell.js"></script>
  <script src="assets/js/employees.js"></script>
  <script>HRMS.shell.mount({ active: "employees" });</script>
</body>
</html>
