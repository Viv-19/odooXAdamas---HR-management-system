    <style>
        input[type="password"]::-ms-reveal,
        input[type="password"]::-ms-clear {
            display: none;
        }
    </style>

<body class="bg-slate-50 min-h-screen font-body-md text-on-surface flex items-center justify-center p-4 pt-24">
    <!-- The TopAppBar and SideNavBar are SUPPRESSED for this transactional Sign-Up flow as per the 'Semantic Shell' Mandate. -->
    <div
        class="bg-surface shadow-[0px_4px_20px_rgba(0,0,0,0.05)] rounded-xl w-full max-w-2xl overflow-hidden border border-slate-100 flex flex-col md:flex-row mx-auto">
        <!-- Left Side: Branding / Intro (Optional, but adds to the high-end feel)-->
        <div
            class="hidden md:flex flex-col justify-center items-center bg-surface-container-low p-8 w-1/3 border-r border-slate-100">
            <div class="font-headline-xl text-headline-xl text-primary font-bold mb-4 tracking-tight">HRMS</div>
            <p class="font-body-sm text-body-sm text-on-surface-variant text-center">Streamlining your workforce
                management with calm and clarity.</p>
        </div>
        <!-- Right Side: Form -->
        <div class="p-8 w-full md:w-2/3">
            <h1 class="font-headline-lg text-headline-lg text-on-surface mb-6 text-center md:text-left">Create an
                Account</h1>
            <form class="space-y-4" id="signupForm">
                <!-- Role Selection -->
                <div class="flex flex-col">
                    <label class="font-label-md text-label-md text-on-surface-variant mb-1" for="employeeId">Employee
                        ID</label>
                    <input
                        class="border border-slate-200 rounded-DEFAULT px-3 py-2 focus:outline-none focus:border-primary focus:ring-0 focus:shadow-[0_0_0_3px_rgba(14,165,233,0.15)] transition-all font-body-sm text-body-sm bg-surface"
                        id="employeeId" placeholder="Enter your ID" type="text">
                </div>
                <div class="flex flex-col">
                    <label class="font-label-md text-label-md text-on-surface-variant mb-1" for="email">Email</label>
                    <input
                        class="border border-slate-200 rounded-DEFAULT px-3 py-2 focus:outline-none focus:border-primary focus:ring-0 focus:shadow-[0_0_0_3px_rgba(14,165,233,0.15)] transition-all font-body-sm text-body-sm bg-surface"
                        id="email" placeholder="name@company.com" type="email">
                </div>
                <!-- Logo Upload -->
                <p class="text-body-sm text-on-surface-variant italic">Password must be at least 8 characters long and
                    include a special character.</p>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <!-- Password -->
                    <div class="flex flex-col relative">
                        <label class="font-label-md text-label-md text-on-surface-variant mb-1"
                            for="password">Password</label>
                        <input
                            class="border border-slate-200 rounded-DEFAULT px-3 py-2 focus:outline-none focus:border-primary focus:ring-0 focus:shadow-[0_0_0_3px_rgba(14,165,233,0.15)] transition-all font-body-sm text-body-sm bg-surface w-full pr-10"
                            id="password" type="password">
                        <button aria-label="Toggle password visibility"
                            class="absolute right-2 top-8 text-outline hover:text-on-surface transition-colors"
                            type="button">
                            <span class="material-symbols-outlined text-[20px]">visibility_off</span>
                        </button>
                    </div>
                    <!-- Confirm Password -->
                    <div class="flex flex-col relative">
                        <label class="font-label-md text-label-md text-on-surface-variant mb-1"
                            for="confirmPassword">Confirm Password</label>
                        <input
                            class="border border-slate-200 rounded-DEFAULT px-3 py-2 focus:outline-none focus:border-primary focus:ring-0 focus:shadow-[0_0_0_3px_rgba(14,165,233,0.15)] transition-all font-body-sm text-body-sm bg-surface w-full pr-10"
                            id="confirmPassword" type="password">
                        <button aria-label="Toggle confirm password visibility"
                            class="absolute right-2 top-8 text-outline hover:text-on-surface transition-colors"
                            type="button">
                            <span class="material-symbols-outlined text-[20px]">visibility_off</span>
                        </button>
                    </div>
                </div>
                <!-- Submit Button -->
                <div class="flex flex-col gap-4 mt-6">
                    <p id="errorMessage" class="text-red-500 text-sm hidden font-medium text-center"></p>
                    <button
                        class="w-full bg-primary text-on-primary font-bold py-3 rounded-lg hover:bg-primary-container transition-colors shadow-sm"
                        type="submit">Create Account</button>
                    <p class="text-center text-body-sm text-on-surface-variant">
                        Already have an account? <a class="text-primary font-bold hover:underline" href="signin.html">Sign In</a>
                    </p>
                </div>
            </form>
        </div>
    </div>



    <script>
        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const employeeId = document.getElementById('employeeId').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const errorEl = document.getElementById('errorMessage');

            errorEl.classList.add('hidden');

            if (password !== confirmPassword) {
                errorEl.textContent = "Passwords do not match";
                errorEl.classList.remove('hidden');
                return;
            }

            try {
                const res = await fetch('http://localhost:5000/api/v1/auth/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ employeeId, email, password, confirmPassword, role: 'EMPLOYEE' })
                });
                const data = await res.json();
                if (res.ok) {
                    localStorage.setItem('verifyEmail', email);
                    window.location.href = 'verify.html';
                } else {
                    let errorMsg = data.message || "Signup failed";
                    if (data.errors && data.errors.length > 0) {
                        errorMsg = data.errors[0].replace(/"/g, ''); // Remove quotes from joi error
                    }
                    errorEl.textContent = errorMsg;
                    errorEl.classList.remove('hidden');
                }
            } catch (err) {
                console.error(err);
                errorEl.textContent = "Error connecting to backend";
                errorEl.classList.remove('hidden');
            }
        });
    </script>
</body>

</html>
