<body class="bg-background min-h-screen font-body-md text-on-surface flex flex-col">
<!-- Top Navigation (Suppressed Links for Auth) -->
<header class="bg-surface dark:bg-on-background shadow-[0px_4px_20px_rgba(0,0,0,0.05)] flex justify-between items-center w-full px-margin-mobile md:px-margin-desktop h-16 sticky top-0 z-50">
<div class="flex items-center">
<span class="font-headline-md text-headline-md font-bold text-primary dark:text-primary-fixed-dim">HRMS</span>
</div>
<div class="flex items-center gap-4">
<!-- Navigation links suppressed for login -->
</div>
</header>
<!-- Main Content -->
<main class="flex-grow flex items-center justify-center p-margin-mobile md:p-margin-desktop">
<div class="bg-surface-container-lowest w-full max-w-[480px] rounded-xl shadow-[0px_4px_20px_rgba(0,0,0,0.05)] border border-surface-variant p-lg flex flex-col items-center">
<!-- Logo / Heading -->
<div class="text-center mb-lg">
<h1 class="font-headline-lg text-headline-lg text-on-surface mb-xs">Welcome Back</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Please sign in to continue</p>
</div>
<!-- Sign In Form -->
<form class="w-full flex flex-col gap-md" id="signinForm">
<!-- Login ID / Email -->
<div class="flex flex-col gap-base">
<label class="font-label-md text-label-md text-on-surface uppercase" for="loginId">Login ID / Email</label>
<div class="relative">
<input class="w-full h-[48px] px-sm rounded-lg border border-outline-variant bg-surface-container-lowest text-on-surface font-body-md text-body-md focus:outline-none focus:border-primary focus:ring-4 focus:ring-primary/15 transition-all" id="loginId" placeholder="Enter your Login ID or Email" type="text"/>
</div>
</div>
<!-- Password -->
<div class="flex flex-col gap-base">
<label class="font-label-md text-label-md text-on-surface uppercase" for="password">Password</label>
<div class="relative">
<input class="w-full h-[48px] pl-sm pr-[48px] rounded-lg border border-outline-variant bg-surface-container-lowest text-on-surface font-body-md text-body-md focus:outline-none focus:border-primary focus:ring-4 focus:ring-primary/15 transition-all" id="password" placeholder="Enter your password" type="password"/>
<button class="absolute right-sm top-1/2 -translate-y-1/2 text-outline-variant hover:text-on-surface transition-colors" onclick="togglePasswordVisibility()" type="button">
<span class="material-symbols-outlined" id="visibilityIcon">visibility_off</span>
</button>
</div>
</div>
<!-- Remember Me & Forgot Password -->
<div class="flex justify-between items-center mt-xs">
<label class="flex items-center gap-xs cursor-pointer group">
<input class="w-4 h-4 rounded border-outline-variant text-primary focus:ring-primary/20 bg-surface-container-lowest cursor-pointer" type="checkbox"/>
<span class="font-body-sm text-body-sm text-on-surface-variant group-hover:text-on-surface transition-colors">Remember me</span>
</label>
<a class="font-body-sm text-body-sm text-primary hover:text-primary-container font-medium transition-colors" href="forgot-password.html">Forgot Password?</a>
</div>
<!-- Error Message -->
<p id="errorMessage" class="text-red-500 text-sm hidden mb-2 font-medium"></p>
<!-- Submit Button -->
<button class="w-full h-[48px] mt-sm bg-primary text-on-primary font-label-md text-label-md uppercase rounded-lg hover:bg-primary-container transition-colors active:scale-[0.98] shadow-sm flex items-center justify-center" type="submit">
                    Sign In
                </button>
</form>
<!-- Sign Up Link -->
<div class="mt-lg text-center">
<p class="font-body-sm text-body-sm text-on-surface-variant">
                    Don't have an account? 
                    <a class="text-primary hover:text-primary-container font-medium transition-colors" href="signup.html">Sign Up</a>
</p>
</div>
</div>
</main>
<script>
        function togglePasswordVisibility() {
            const passwordInput = document.getElementById('password');
            const visibilityIcon = document.getElementById('visibilityIcon');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                visibilityIcon.textContent = 'visibility';
            } else {
                passwordInput.type = 'password';
                visibilityIcon.textContent = 'visibility_off';
            }
        }
    </script>
    <script>
        document.getElementById('signinForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('loginId').value;
            const password = document.getElementById('password').value;
            const errorEl = document.getElementById('errorMessage');
            
            errorEl.classList.add('hidden');

            try {
                const res = await fetch('http://localhost:5000/api/v1/auth/signin', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();
                if (res.ok) {
                    localStorage.setItem('token', data.data.token);
                    // window.location.href = 'dashboard.html';
                } else {
                    errorEl.textContent = data.message || "Login failed";
                    errorEl.classList.remove('hidden');
                }
            } catch (err) {
                console.error(err);
                errorEl.textContent = "Error connecting to backend";
                errorEl.classList.remove('hidden');
            }
        });
    </script>
