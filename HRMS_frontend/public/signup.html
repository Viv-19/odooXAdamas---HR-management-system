<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account — HRMS</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <script src="assets/js/theme.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=block" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/global.css">
</head>
<body data-auth-page="signup" class="min-h-screen flex items-center justify-center p-4 py-10"
      style="background:radial-gradient(1200px 600px at 50% -10%, #e0f2fe 0%, var(--background) 55%);">
  <main class="w-full" style="max-width:680px;">
    <div class="card animate-in flex flex-col md:flex-row overflow-hidden" style="padding:0;">
      <!-- Left: branding panel -->
      <div class="hidden md:flex flex-col justify-center" style="width:38%;padding:32px;background:linear-gradient(160deg,var(--primary),var(--primary-container));color:#fff;">
        <div class="flex items-center gap-2 mb-4">
          <span style="width:40px;height:40px;border-radius:11px;background:rgba(255,255,255,.18);display:flex;align-items:center;justify-content:center;">
            <span class="material-symbols-outlined icon-fill" style="color:#fff;">domain</span>
          </span>
          <span class="h-lg" style="font-size:26px;color:#fff;">HRMS</span>
        </div>
        <p style="font-size:14px;line-height:22px;color:rgba(255,255,255,.9);">Streamlining your workforce management with calm and clarity.</p>
      </div>

      <!-- Right: form -->
      <div style="flex:1;padding:32px;">
        <h1 class="h-lg mb-1">Create an account</h1>
        <p class="text-muted mb-6" style="font-size:14px;">Join your organization's workspace</p>

        <form class="flex flex-col gap-4" novalidate>
          <div class="field">
            <label for="employeeId">Employee ID</label>
            <input class="input" id="employeeId" name="employeeId" type="text" placeholder="EMP-2024-000">
          </div>
          <div class="field">
            <label for="email">Email</label>
            <input class="input" id="email" name="email" type="email" placeholder="name@company.com">
          </div>

          <p class="field-hint" style="font-style:italic;">Password must be at least 8 characters long and include a special character.</p>

          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="field">
              <label for="password">Password</label>
              <div class="relative">
                <input class="input" id="password" name="password" type="password" autocomplete="new-password" placeholder="Create a password" style="padding-right:44px;">
                <button type="button" data-toggle-password="#password" aria-label="Toggle password visibility"
                        class="absolute" style="right:8px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--outline);cursor:pointer;display:flex;">
                  <span class="material-symbols-outlined">visibility_off</span>
                </button>
              </div>
            </div>
            <div class="field">
              <label for="confirmPassword">Confirm Password</label>
              <div class="relative">
                <input class="input" id="confirmPassword" name="confirmPassword" type="password" autocomplete="new-password" placeholder="Re-enter password" style="padding-right:44px;">
                <button type="button" data-toggle-password="#confirmPassword" aria-label="Toggle password visibility"
                        class="absolute" style="right:8px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--outline);cursor:pointer;display:flex;">
                  <span class="material-symbols-outlined">visibility_off</span>
                </button>
              </div>
            </div>
          </div>

          <!-- Strength meter -->
          <div id="pw-strength" class="flex items-center gap-3" style="margin-top:-2px;">
            <div style="flex:1;height:6px;border-radius:9999px;background:var(--surface-container-high);overflow:hidden;">
              <div data-bar style="height:100%;width:0;background:var(--outline-variant);transition:width .2s,background .2s;"></div>
            </div>
            <span data-label style="font-size:12px;font-weight:600;min-width:52px;text-align:right;"></span>
          </div>

          <button type="submit" class="btn btn-primary" style="width:100%;margin-top:8px;">Create Account</button>
          <p class="text-center text-muted" style="font-size:14px;">
            Already have an account? <a class="link" href="signin.html">Sign In</a>
          </p>
        </form>
      </div>
    </div>
  </main>

  <script src="js/utils.js"></script>
  <script src="assets/js/store.js"></script>
  <script src="assets/js/ui.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
