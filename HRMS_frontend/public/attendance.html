<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Attendance — HRMS</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <script src="assets/js/theme.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=block" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/global.css">
  <link rel="stylesheet" href="assets/css/app.css">
  <style>
    .date-nav-btn { width:36px;height:36px;border-radius:8px;border:1px solid var(--outline-variant);background:var(--surface);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--on-surface-variant); }
    .date-nav-btn:hover { border-color:var(--primary);color:var(--primary-hover); }
    .hours-pill { padding:3px 10px;border-radius:9999px;font-size:12px;font-weight:600; }
  </style>
</head>
<body>
  <div class="app-layout" id="hrms-app">
    <div class="app-main">
      <header class="app-topbar" id="hrms-topbar"></header>
      <main class="app-content">
        <div id="att-root"></div>
      </main>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/utils.js"></script>
  <script src="assets/js/store.js"></script>
  <script src="assets/js/ui.js"></script>
  <script src="assets/js/shell.js"></script>
  <script src="assets/js/attendance.js"></script>
  <script>HRMS.shell.mount({ active: "attendance" });</script>
</body>
</html>
